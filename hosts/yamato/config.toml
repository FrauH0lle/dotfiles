## Modules

depends_on = [
  "base",
  "shell/bash",
  "shell/zsh",
  "desktop/plasma",
  "desktop/apps/calibre",
  # "desktop/apps/libreoffice",
  "desktop/fonts",
  "desktop/spelling",
  "editors/emacs",
  "hardware/hp-printer",
  "dev/R",
  "dev/rust",
  "dev/containers",
  "services/samba",
  "vm/virtualbox",
  # "browsers/vivaldi",
  "backup/snapper"
]

## Config to include

[[includes]]
files = [
  "$DOD_HOSTS_ROOT/shared/env-sh.toml",
  "$DOD_HOSTS_ROOT/shared/fstrim.toml",
  "$DOD_HOSTS_ROOT/shared/hosts.toml",
  "$DOD_HOSTS_ROOT/shared/generators.toml"
]

[[includes]]
files = [ "$DOD_HOSTS_ROOT/shared/arch-system.toml" ]
if = "(eq DOD_DISTRIBUTION_NAME 'arch')"

## Packages

[[packages]]
install = [ "dotdeploy/host-yamato" ]
if = "(eq DOD_DISTRIBUTION_NAME 'gentoo')"

[[packages]]
install = [
  "borgmatic",
  # borgmatic optional
  "opt:python-pyfuse3",
  "nextcloud-client", "keepassxc",
  "input-remapper-git",
  # input-remapper optional
  "opt:xorg-xmodmap",
  "strawberry",
  # Bootloader management
  "limine-mkinitcpio-hook",
  "limine-snapper-sync"
]
if = "(eq DOD_DISTRIBUTION_NAME 'arch')"


## Files

# Host portage and package configuration
[[files]]
source = "gentoo/portage/*"
target = "/etc/portage/*"
phase = "setup"
type = "copy"
if = "(eq DOD_DISTRIBUTION_NAME 'gentoo')"

# System tweaks
[[files]]
source = "gentoo/tweaks/*"
target = "/etc/*"
type = "copy"
if = "(eq DOD_DISTRIBUTION_NAME 'gentoo')"

# Host specific dotfiles
[[files]]
source = "home/*"
target = "$HOME/*"

## Context variables for template expansion

[context_vars]
ncpu = "32"
