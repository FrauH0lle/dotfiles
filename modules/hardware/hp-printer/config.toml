## Packages

[[packages]]
install = [
  "hplip", "hplip-plugin",
  "opt:cups", "opt:sane", "opt:python-pillow", "opt:python-reportlab",
  "opt:rpcbind", "opt:python-pyqt5", "opt:libusb", "opt:wget"
]
if = "(eq DOD_DISTRIBUTION_NAME 'arch')"


## Includes

[[includes]]
files = [ "cups.toml" ]


## Tasks

[[tasks]]
[[tasks.config]]
description = "Add $USER to printer groups"
shell = '''
for GROUP in lp lpadmin scanner; do
  if ! id -nG "$USER" | grep -qw "$GROUP"; then
    sudo gpasswd -a "$USER" "$GROUP"
  fi
done
'''
[[tasks.remove]]
description = "Remove $USER from printer groups"
shell = '''
for GROUP in lp lpadmin scanner; do
  if id -nG "$USER" | grep -qw "$GROUP"; then
    sudo gpasswd -d "$USER" "$GROUP"
  fi
done
'''
