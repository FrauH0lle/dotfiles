# 	kde-apps/okular
# "

# Files
# Package configuration
[[files]]
source = "gentoo/portage/*"
target = "/etc/portage/*"
phase = "setup"
type = "copy"
if = "(eq DOD_DISTRIBUTION_NAME 'gentoo')"

[[files]]
source = "49-wheel.rules"
target = "/etc/etc/polkit-1/rules.d/49-wheel.rules"
type = "copy"
if = "(eq DOD_DISTRIBUTION_NAME 'gentoo')"

# Includes
[[includes]]
files = [ "pipewire.toml", "flathub.toml" ]
