# Packages
[[packages]]
install = [ "dotdeploy/shell-common" ]
if = "(eq DOD_DISTRIBUTION_NAME 'gentoo')"

[[packages]]
install = [ "dotdeploy-shell-common" ]
if = "(eq DOD_DISTRIBUTION_NAME 'ubuntu')"

[[packages]]
install = [ "bat", "eza", "fd", "fzf", "tree", "tealdeer", "direnv" ]
if = "(eq DOD_DISTRIBUTION_NAME 'arch')"

# TLDR

[[includes]]
files = [ "get_tldr.toml" ]
if = "(contains DOD_DISTRIBUTION_NAME 'gentoo')"

# Direnv

[[includes]]
files = [ "get_direnv.toml" ]
if = "(contains DOD_DISTRIBUTION_NAME 'gentoo')"
