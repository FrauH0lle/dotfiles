[fedora-rstudio]
image=registry.fedoraproject.org/fedora-toolbox:43
entry=false
pre_init_hooks=sudo update-ca-trust;
pre_init_hooks=sudo dnf --assumeyes copr enable iucar/rstudio;
init_hooks=sudo chown -R $USER:$USER $HOME/;
additional_packages="rstudio-desktop R-devel"
volume="/usr/local/share/ca-certificates/curl-ca-bundle.crt:/etc/pki/ca-trust/source/anchors/curl-ca-bundle.crt:ro"
volume="/mnt:/mnt"
home=~/distrobox/fedora-rstudio
replace=true
exported_apps="rstudio"
