[fedora-rstudio]
image=registry.fedoraproject.org/fedora-toolbox:43
pull=true
entry=false
pre_init_hooks=sudo dnf --assumeyes copr enable iucar/rstudio;
init_hooks=sudo chown -R $USER:$USER $HOME/; sudo update-ca-trust;
additional_packages="rstudio-desktop R-devel"
volume="/mnt:/mnt:/usr/local/share/ca-certificates/curl-ca-bundles.crt:/etc/pki/ca-trust/source/anchors/curl-ca-bundles.crt:ro"
home=~/distrobox/fedora-rstudio
replace=true
exported_apps="rstudio"
