## Packages

[[packages]]
install = [
  "virtualbox", "virtualbox-host-dkms", "virtualbox-ext-oracle",
  "virtualbox-guest-iso"
]
if = "(eq DOD_DISTRIBUTION_NAME 'arch')"


## Tasks

[[tasks]]
description = "virtualbox"
[[tasks.config]]
description = "Add $USER to vboxusers"
shell = '''
if ! id -nG "$USER" | grep -qw vboxusers; then
  sudo gpasswd -a "$USER" vboxusers
fi
'''
[[tasks.remove]]
description = "Remove $USER from vboxusers"
shell = '''
if id -nG "$USER" | grep -qw vboxusers; then
  sudo gpasswd -d "$USER" vboxusers
fi
'''
